name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Validate tag and Cargo version
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must have the form vX.Y.Z" >&2
            exit 1
          fi
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [[ "$tag_version" != "$cargo_version" ]]; then
            echo "Tag $tag_version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Verify crates.io package
        run: cargo publish --locked --dry-run

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package binary
        shell: bash
        run: |
          archive="gencommit-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar -C target/release -czf "$archive" gencommit
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gencommit-${{ matrix.target }}
          path: |
            gencommit-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz
            gencommit-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish to crates.io
    needs: [validate, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check whether version is already published
        id: crate
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --user-agent "gencommit-release-workflow/$VERSION" \
            "https://crates.io/api/v1/crates/gencommit/$VERSION")"
          case "$status" in
            200) echo "published=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "published=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected crates.io response: HTTP $status" >&2; exit 1 ;;
          esac

      - name: Publish crate
        if: steps.crate.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  github-release:
    name: Create GitHub Release
    needs: [validate, build, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gencommit-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              --verify-tag
          fi
